<script>
// =====================================================================
//  STATE
// =====================================================================
let loggedIn = false;
let currentPage = 'home';
let viewingTripId = null;
let activeDay = 0;
let createForm = { destination:'', days:3, budget:'medium', travelStyle:'solo' };
let selectedBudget = 'medium';
let selectedStyle = 'solo';

// Persistent trip store (survives page nav, lost on reload)
let trips = [];
let nextId = 1;

// =====================================================================
//  ITINERARY GENERATOR  (client-side, mirrors server fallback logic)
// =====================================================================
function generateItinerary(destination, days, budget, travelStyle) {
  const costPerAct = {low:'$8',medium:'$20',high:'$50'};
  const totalCosts = {low:'$'+(days*45)+' - $'+(days*80),medium:'$'+(days*100)+' - $'+(days*180),high:'$'+(days*250)+' - $'+(days*450)};
  const c = costPerAct[budget]||costPerAct.medium;

  const poiDb = {
    default:[
      {a:'Visit the main historical landmark',l:'City Center'},{a:'Explore the local market',l:'Market District'},
      {a:'Walking food tour',l:'Old Town'},{a:'Museum of local history',l:'Cultural Quarter'},
      {a:'Scenic viewpoint hike',l:'Hilltop Park'},{a:'Boat ride or waterfront walk',l:'Waterfront'},
      {a:'Traditional cooking class',l:'Culinary School'},{a:'Street art walking tour',l:'Arts District'},
      {a:'Visit a famous temple or cathedral',l:'Historic District'},{a:'Sunset at the best lookout point',l:'Panoramic Point'},
      {a:'Shopping at local boutiques',l:'Shopping Street'},{a:'Try the signature local dish',l:'Famous Eatery'},
      {a:'Relax at a park or garden',l:'Central Park'},{a:'Day trip to nearby village',l:'Countryside'},
      {a:'Nightlife & live music',l:'Entertainment Quarter'},{a:'Photography walk',l:'Scenic Route'},
      {a:'Cycling tour of the city',l:'Bike Path'},{a:'Visit a local festival or event',l:'Town Square'},
    ]
  };

  const styleActs = {
    solo:['Cafe hopping','Solo photography walk','Journal at a scenic spot','Visit a bookshop','Meditate at a quiet temple'],
    couple:['Romantic dinner cruise','Couples spa session','Wine tasting','Sunset picnic','Horse carriage ride'],
    family:['Theme park visit','Zoo & aquarium','Family cooking class','Interactive science museum','Beach day'],
    friends:['Pub crawl','Adventure sports','Group hiking','Beach volleyball','Night market tour'],
  };

  const extras = styleActs[travelStyle]||styleActs.solo;
  const pois = poiDb.default;
  const times = ['08:00 AM','09:30 AM','11:00 AM','12:30 PM','02:30 PM','04:30 PM','06:30 PM'];

  const itinerary = [];
  for(let d=1;d<=days;d++){
    const acts=[];
    for(let a=0;a<Math.min(6,times.length);a++){
      const pool = a%3===0 ? extras : pois;
      const item = pool[(d*7+a)%pool.length];
      const isExtra = typeof item === 'string';
      acts.push({
        time:times[a],
        activity:isExtra?item:item.a,
        location:isExtra?`${destination} area`:item.l+', '+destination,
        estimatedCost:a===0?'Free':c,
        description:isExtra?`Enjoy ${item.toLowerCase()} in ${destination}`:`Great experience in the heart of ${destination}`
      });
    }
    itinerary.push({
      day:d,
      title:d===1?`Day ${d} - Arrival & First Impressions`:d===days?`Day ${d} - Final Day & Departure`:`Day ${d} - Exploring ${destination}`,
      activities:acts,
      meals:{
        breakfast:d===1?'Hotel breakfast or nearby café':`Local café in ${destination}`,
        lunch:`Popular ${destination} eatery`,
        dinner:`Authentic ${destination} restaurant`
      },
      tips:[
        d===1?'Arrive early to beat crowds':'Start your day early for the best experience',
        'Stay hydrated and carry sunscreen',
        budget==='low'?'Use public transport to save money':'Consider a day pass for transport'
      ]
    });
  }

  const hotels = {
    low:[{name:`${destination} Backpackers Hostel`,priceRange:'$15-$40/night',rating:'4.0/5',location:'City Center'},
         {name:`${destination} Budget Inn`,priceRange:'$25-$50/night',rating:'3.8/5',location:'Near Station'},
         {name:`Cozy ${destination} Guesthouse`,priceRange:'$20-$45/night',rating:'4.1/5',location:'Old Town'}],
    medium:[{name:`${destination} Comfort Hotel`,priceRange:'$60-$120/night',rating:'4.3/5',location:'Downtown'},
            {name:`${destination} Boutique Stay`,priceRange:'$80-$140/night',rating:'4.5/5',location:'Arts District'},
            {name:`Central ${destination} Suites`,priceRange:'$70-$130/night',rating:'4.2/5',location:'City Center'}],
    high:[{name:`${destination} Grand Resort & Spa`,priceRange:'$200-$500/night',rating:'4.8/5',location:'Premium District'},
          {name:`The ${destination} Palace Hotel`,priceRange:'$250-$600/night',rating:'4.9/5',location:'Waterfront'},
          {name:`${destination} Luxury Collection`,priceRange:'$180-$400/night',rating:'4.7/5',location:'Business District'}]
  };

  return {
    itinerary,
    totalEstimatedCost:totalCosts[budget]||totalCosts.medium,
    bestTimeToVisit:'October - March',
    generalTips:[
      `Learn a few local phrases before visiting ${destination}`,
      'Book accommodations in advance for better rates',
      'Always carry a copy of your travel documents',
      `Try local cuisine at small family-owned restaurants in ${destination}`,
      'Download offline maps before your trip'
    ],
    hotelSuggestions:hotels[budget]||hotels.medium,
    weatherInfo:`${destination} generally has pleasant weather for travelers. Check forecasts close to your travel dates for the most accurate conditions.`
  };
}

// =====================================================================
//  NAV
// =====================================================================
function updateNav(){
  const n=document.getElementById('nav-links');
  if(loggedIn){
    n.innerHTML=`<a href="#" onclick="show('dashboard')" class="text-sm text-gray-400 hover:text-white transition px-3 py-2">My Trips</a>
    <button onclick="show('create')" class="flex items-center gap-1.5 text-sm bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg transition">+ New Trip</button>
    <div class="flex items-center gap-2 ml-2 pl-4 border-l border-white/10"><span class="text-sm text-gray-400 hidden sm:inline">Demo User</span>
    <button onclick="doLogout()" class="text-gray-500 hover:text-pink-400 transition p-1" title="Logout">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2h5a2 2 0 012 2v1"/></svg>
    </button></div>`;
  } else {
    n.innerHTML=`<a href="#" onclick="show('login')" class="text-sm text-gray-400 hover:text-white transition px-3 py-2">Login</a>
    <button onclick="show('signup')" class="text-sm bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg transition">Get Started</button>`;
  }
}
function doLogout(){ loggedIn=false; trips=[]; show('home'); }

// =====================================================================
//  ROUTER
// =====================================================================
function show(page, data){
  currentPage=page;
  if(data) viewingTripId=data;
  if(page==='dashboard'||page==='create'||page==='trip') loggedIn=true;
  updateNav();
  render();
  window.scrollTo(0,0);
}

// =====================================================================
//  RENDER DISPATCHER
// =====================================================================
function render(){
  const app=document.getElementById('app');
  switch(currentPage){
    case 'home': app.innerHTML=renderHome(); break;
    case 'login': app.innerHTML=renderLogin(); break;
    case 'signup': app.innerHTML=renderSignup(); break;
    case 'dashboard': app.innerHTML=renderDashboard(); break;
    case 'create': app.innerHTML=renderCreate(); break;
    case 'loading': app.innerHTML=renderLoading(); break;
    case 'trip': app.innerHTML=renderTripDetails(); initDayTabs(); break;
  }
}

          <button type="button" data-val="medium" onclick="pickBudget('medium',this)" class="glass rounded-xl p-4 text-left border border-indigo-500 bg-indigo-500/10 transition">
            <span class="text-xl">&#127976;</span><p class="text-sm font-medium text-white mt-2">Moderate</p><p class="text-xs text-gray-600 mt-1">Mid-range hotels, restaurants, taxis</p></button>
          <button type="button" data-val="high" onclick="pickBudget('high',this)" class="glass rounded-xl p-4 text-left border border-transparent hover:border-white/10 transition">
            <span class="text-xl">&#10024;</span><p class="text-sm font-medium text-white mt-2">Luxury</p><p class="text-xs text-gray-600 mt-1">5-star hotels, fine dining, private transfers</p></button>
        </div>
      </div>
      <div>
        <label class="flex items-center gap-2 text-sm font-medium text-gray-300 mb-3">&#128101; Travel Style</label>
        <div class="grid grid-cols-4 gap-3" id="style-group">
          <button type="button" data-val="solo" onclick="pickStyle('solo',this)" class="glass rounded-xl p-4 text-center border border-indigo-500 bg-indigo-500/10 transition">
            <span class="text-2xl">&#129523;</span><p class="text-xs font-medium text-white mt-2">Solo</p></button>
          <button type="button" data-val="couple" onclick="pickStyle('couple',this)" class="glass rounded-xl p-4 text-center border border-transparent hover:border-white/10 transition">
            <span class="text-2xl">&#128149;</span><p class="text-xs font-medium text-white mt-2">Couple</p></button>
          <button type="button" data-val="family" onclick="pickStyle('family',this)" class="glass rounded-xl p-4 text-center border border-transparent hover:border-white/10 transition">
            <span class="text-2xl">&#128104;&#8205;&#128105;&#8205;&#128103;&#8205;&#128102;</span><p class="text-xs font-medium text-white mt-2">Family</p></button>
          <button type="button" data-val="friends" onclick="pickStyle('friends',this)" class="glass rounded-xl p-4 text-center border border-transparent hover:border-white/10 transition">
            <span class="text-2xl">&#127881;</span><p class="text-xs font-medium text-white mt-2">Friends</p></button>
        </div>
      </div>
      <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 via-indigo-500 to-purple-500 text-white font-semibold py-3.5 rounded-xl text-lg hover:opacity-90 transition shadow-lg shadow-indigo-500/25">
        Generate Itinerary with AI
      </button>
    </form>
  </div></div>`;
}

function pickBudget(val,el){
  selectedBudget=val;
  document.querySelectorAll('#budget-group button').forEach(b=>{b.classList.remove('border-indigo-500','bg-indigo-500/10');b.classList.add('border-transparent')});
  el.classList.add('border-indigo-500','bg-indigo-500/10');el.classList.remove('border-transparent');
}
function pickStyle(val,el){
  selectedStyle=val;
  document.querySelectorAll('#style-group button').forEach(b=>{b.classList.remove('border-indigo-500','bg-indigo-500/10');b.classList.add('border-transparent')});
  el.classList.add('border-indigo-500','bg-indigo-500/10');el.classList.remove('border-transparent');
}

function handleCreateTrip(){
  const dest = document.getElementById('inp-dest').value.trim();
  const days = parseInt(document.getElementById('inp-days').value);
  const errEl = document.getElementById('create-error');

  if(!dest){
    errEl.textContent='Please enter a destination';
    errEl.classList.remove('hidden');
    return;
  }

  // Show loading
  const loadDest = dest;
  const loadDays = days;
  currentPage='loading';
  document.getElementById('app').innerHTML = renderLoadingScreen(loadDest, loadDays);

  // Simulate AI generation delay
  setTimeout(()=>{
    const ai = generateItinerary(dest, days, selectedBudget, selectedStyle);
    const trip = {
      id: nextId++,
      destination: dest,
      days: days,
      budget: selectedBudget,
      travelStyle: selectedStyle,
      itinerary: ai.itinerary,
      totalEstimatedCost: ai.totalEstimatedCost,
      bestTimeToVisit: ai.bestTimeToVisit,
      generalTips: ai.generalTips,
      hotelSuggestions: ai.hotelSuggestions,
      weatherInfo: ai.weatherInfo,
      createdAt: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
    };
    trips.unshift(trip);
    show('trip', trip.id);
  }, 2000);
}

function renderLoadingScreen(dest, days){
  return `
  <div class="min-h-screen pt-16 flex flex-col items-center justify-center">
    <div class="flex gap-2 mb-6">
      <div class="w-4 h-4 rounded-full bg-cyan-400 loader-dot"></div>
      <div class="w-4 h-4 rounded-full bg-purple-500 loader-dot"></div>
      <div class="w-4 h-4 rounded-full bg-pink-500 loader-dot"></div>
    </div>
    <p class="text-gray-400 text-sm animate-pulse">Creating your ${days}-day itinerary for ${dest}...</p>
    <p class="text-gray-600 text-xs mt-2">Our AI is planning the perfect trip</p>
  </div>`;
}

// =====================================================================
//  DELETE TRIP
// =====================================================================
function deleteTrip(id){
  if(!confirm('Delete this trip permanently?')) return;
  trips = trips.filter(t=>t.id!==id);
  if(currentPage==='trip' && viewingTripId===id){
    show('dashboard');
  } else {
    render();
  }
}

// =====================================================================
//  PAGE: TRIP DETAILS
// =====================================================================
function renderTripDetails(){
  const trip = trips.find(t=>t.id===viewingTripId);
  if(!trip) return `<div class="min-h-screen pt-24 flex items-center justify-center"><p class="text-gray-500">Trip not found.</p></div>`;

  activeDay=0;

  // Hotels HTML
  let hotelsHtml='';
  if(trip.hotelSuggestions&&trip.hotelSuggestions.length>0){
    hotelsHtml=`<div class="glass rounded-2xl p-6 mt-6">
      <h3 class="text-lg font-semibold text-white mb-4">Hotel Suggestions</h3>
      <div class="grid sm:grid-cols-3 gap-4">
      ${trip.hotelSuggestions.map(h=>`
        <div class="bg-[#0f0f1a]/50 rounded-xl p-4">
          <h4 class="text-sm font-medium text-white">${h.name}</h4>
          <p class="text-xs text-gray-500 mt-1">${h.location}</p>
          <div class="flex justify-between mt-2 text-xs">
            <span class="text-pink-400">${h.priceRange}</span>
            <span class="text-yellow-400">${h.rating}</span>
          </div>
        </div>`).join('')}
      </div></div>`;
  }

  // General tips
  let tipsHtml='';
  if(trip.generalTips&&trip.generalTips.length>0){
    tipsHtml=`<div class="glass rounded-2xl p-6 mt-8">
      <h3 class="text-lg font-semibold text-white mb-4">General Travel Tips</h3>
      <ul class="space-y-2">
      ${trip.generalTips.map(t=>`<li class="text-sm text-gray-400 flex gap-2"><span class="text-cyan-400 shrink-0">&#10003;</span> ${t}</li>`).join('')}
      </ul></div>`;
  }

  return `
  <div class="min-h-screen pt-24 pb-16 px-4"><div class="max-w-6xl mx-auto fade-up">
    <div class="flex items-center justify-between mb-8">
      <button onclick="show('dashboard')" class="flex items-center gap-2 text-sm text-gray-500 hover:text-white transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg> Back to trips
      </button>
      <button onclick="deleteTrip(${trip.id})" class="flex items-center gap-2 text-sm text-gray-600 hover:text-red-400 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg> Delete
      </button>
    </div>

    <!-- Header card -->
    <div class="glass rounded-2xl p-8 mb-6">
      <h1 class="text-3xl sm:text-4xl font-bold text-white flex items-center gap-3">
        <span class="text-cyan-400">&#128205;</span> ${trip.destination}
      </h1>
      <div class="flex flex-wrap gap-4 mt-4 text-sm text-gray-400">
        <span>&#128197; ${trip.days} day${trip.days>1?'s':''}</span>
        <span class="capitalize">&#128176; ${trip.budget} budget</span>
        <span class="capitalize">&#128101; ${trip.travelStyle} trip</span>
        <span class="text-pink-400">&#128176; Total: ${trip.totalEstimatedCost}</span>
      </div>
    </div>

    <!-- Info row -->
    <div class="grid sm:grid-cols-3 gap-4 mb-8">
      <div class="glass rounded-xl p-5">
        <h3 class="text-sm font-medium text-gray-400 mb-2">&#127783;&#65039; Weather</h3>
        <p class="text-sm text-gray-300">${trip.weatherInfo||'Check local forecasts before travel.'}</p>
      </div>
      <div class="glass rounded-xl p-5">
        <h3 class="text-sm font-medium text-gray-400 mb-2">&#128197; Best Time to Visit</h3>
        <p class="text-sm text-gray-300">${trip.bestTimeToVisit||'Year-round'}</p>
      </div>
      ${trip.hotelSuggestions&&trip.hotelSuggestions[0]?`
      <div class="glass rounded-xl p-5">
        <h3 class="text-sm font-medium text-gray-400 mb-2">&#11088; Top Hotel</h3>
        <p class="text-sm text-white font-medium">${trip.hotelSuggestions[0].name}</p>
        <p class="text-xs text-gray-500">${trip.hotelSuggestions[0].priceRange} &middot; ${trip.hotelSuggestions[0].rating}</p>
      </div>`:''}
    </div>

    <!-- Day tabs -->
    <div class="flex gap-2 overflow-x-auto pb-2 mb-6" id="dayTabs"></div>
    <div id="dayContent"></div>

    ${tipsHtml}
    ${hotelsHtml}
  </div></div>`;
}

function initDayTabs(){
  const trip=trips.find(t=>t.id===viewingTripId);
  if(!trip||!trip.itinerary) return;
  activeDay=0;
  renderDayTabs(trip);
  renderDayContent(trip);
}

function renderDayTabs(trip){
  const el=document.getElementById('dayTabs');
  if(!el) return;
  el.innerHTML=trip.itinerary.map((d,i)=>
    `<button onclick="switchDay(${i})" class="shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition ${i===activeDay?'tab-active':'glass text-gray-500 hover:text-white'}">Day ${d.day}</button>`
  ).join('');
}

function renderDayContent(trip){
  const el=document.getElementById('dayContent');
  if(!el) return;
  const d=trip.itinerary[activeDay];
  if(!d){ el.innerHTML=''; return; }

  let h=`<h2 class="text-xl font-bold text-white mb-6 fade-up">${d.title}</h2><div class="space-y-4 mb-8">`;
  d.activities.forEach((a,i)=>{
    h+=`<div class="glass rounded-xl p-5 flex gap-4 fade-up" style="animation-delay:${i*0.06}s">
      <div class="shrink-0 w-20 text-center">
        <div class="text-cyan-400 text-xs mb-1">&#128336;</div>
        <span class="text-xs font-medium text-gray-400">${a.time}</span>
      </div>
      <div class="flex-1 min-w-0">
        <h4 class="text-sm font-semibold text-white">${a.activity}</h4>
        <p class="text-xs text-gray-500 mt-1">&#128205; ${a.location}</p>
        ${a.description?`<p class="text-xs text-gray-600 mt-1">${a.description}</p>`:''}
      </div>
      <span class="shrink-0 text-xs font-medium text-pink-400 bg-pink-400/10 px-2.5 py-1 rounded-full self-start">${a.estimatedCost}</span>
    </div>`;
  });
  h+=`</div>`;

  // Meals
  if(d.meals){
    h+=`<div class="glass rounded-xl p-5 mb-6 fade-up"><h3 class="text-sm font-medium text-gray-300 mb-3">Meal Suggestions</h3>
    <div class="grid sm:grid-cols-3 gap-3 text-sm">`;
    ['breakfast','lunch','dinner'].forEach(m=>{
      if(d.meals[m]) h+=`<div class="bg-[#0f0f1a]/50 rounded-lg p-3"><span class="text-xs uppercase text-gray-600 tracking-wide">${m}</span><p class="text-gray-300 mt-1">${d.meals[m]}</p></div>`;
    });
    h+=`</div></div>`;
  }

  // Day tips
  if(d.tips&&d.tips.length>0){
    h+=`<div class="glass rounded-xl p-5 fade-up"><h3 class="text-sm font-medium text-gray-300 mb-3">&#128161; Tips for the day</h3><ul class="space-y-1.5">`;
    d.tips.forEach(t=>{h+=`<li class="text-sm text-gray-500 flex gap-2"><span class="text-yellow-400 shrink-0">&bull;</span>${t}</li>`;});
    h+=`</ul></div>`;
  }

  el.innerHTML=h;
}

function switchDay(i){
  const trip=trips.find(t=>t.id===viewingTripId);
  if(!trip) return;
  activeDay=i;
  renderDayTabs(trip);
  renderDayContent(trip);
}

// =====================================================================
//  INIT
// =====================================================================
updateNav();
render();
</script>
</body>
</html>
